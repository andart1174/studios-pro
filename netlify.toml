[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_ENABLED = "false"

[[redirects]]
  from = "/api/proxy-litter/*"
  to = "https://litter.catbox.moe/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/proxy-catbox/*"
  to = "https://files.catbox.moe/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/proxy/*"
  to = "https://tmpfiles.org/:splat"
  status = 200
  force = true

# Static HTML pages — serve them as-is (MUST be before the SPA catch-all)
[[redirects]]
  from = "/faq.html"
  to = "/faq.html"
  status = 200
  force = false

[[redirects]]
  from = "/contact.html"
  to = "/contact.html"
  status = 200
  force = false

[[redirects]]
  from = "/blog/*"
  to = "/blog/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/viewer/*"
  to = "/viewer/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/convert/*"
  to = "/convert/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/ar-viewer/*"
  to = "/ar-viewer/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/apps/*"
  to = "/apps/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/community"
  to = "/community/index.html"
  status = 200
  force = false

[[redirects]]
  from = "/community/map"
  to = "/community/map.html"
  status = 200
  force = false

[[redirects]]
  from = "/community/map/"
  to = "/community/map.html"
  status = 200
  force = false

[[redirects]]
  from = "/community/u/:uid"
  to = "/community/profile.html?u=:uid"
  status = 200
  force = false

[[redirects]]
  from = "/community/post/:id"
  to = "/community/post.html?id=:id"
  status = 200
  force = false

[[redirects]]
  from = "/community/post/"
  to = "/community/post.html"
  status = 200
  force = false

[[redirects]]
  from = "/community/*"
  to = "/community/:splat"
  status = 200
  force = false

# SPA catch-all — React app for everything else
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Disable cache for share-bridge.js and community index to prevent cached popup logic
[[headers]]
  for = "/community/share-bridge.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/community/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"


