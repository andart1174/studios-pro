<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SP Nexus Widget</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&family=Orbitron:wght@700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080c19;--bg2:#0f172a;--bg3:#1e293b;
      --accent:#6366f1;--accent2:#8b5cf6;--accent3:#a78bfa;
      --gold:#f59e0b;--pink:#ec4899;--text:#e2e8f0;--muted:#64748b;
      --border:rgba(99,102,241,.25);--border2:rgba(255,255,255,.08);
    }
    html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
    .widget-card{width:100%;height:100%;display:flex;flex-direction:column;background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;position:relative}
    
    /* HEADER */
    .w-hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(15,23,42,.8);backdrop-filter:blur(10px);border-bottom:1px solid var(--border2)}
    .w-author{display:flex;align-items:center;gap:10px;text-decoration:none;min-width:0}
    .w-av{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);flex-shrink:0}
    .w-av-init{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;border:2px solid var(--accent);flex-shrink:0}
    .w-name-wrap{min-width:0}
    .w-name{font-weight:700;font-size:.84rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .w-cat{display:inline-block;padding:1px 6px;border-radius:10px;font-size:.62rem;font-weight:700;background:rgba(99,102,241,.15);border:1px solid var(--border);color:var(--accent3)}
    
    .w-logo{display:flex;align-items:center;gap:6px;text-decoration:none;flex-shrink:0}
    .w-logo-icon{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:700;font-size:.55rem;color:#fff}
    .w-logo-txt{font-family:'Outfit',sans-serif;font-weight:800;font-size:.78rem;color:#fff}
    .w-logo-txt span{background:linear-gradient(135deg,var(--accent3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    /* BODY */
    .w-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
    .w-body::-webkit-scrollbar{width:4px}
    .w-body::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
    
    .w-text{font-size:.85rem;line-height:1.5;color:#cbd5e1;white-space:pre-wrap;word-break:break-word}
    .w-media-wrap{width:100%;border-radius:12px;overflow:hidden;background:var(--bg3);position:relative}
    .w-img{width:100%;max-height:260px;object-fit:cover;display:block}
    .w-video{width:100%;aspect-ratio:16/9;border:none}

    /* AUDIO PLAYER */
    .w-audio{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(99,102,241,.1);border:1px solid var(--border);border-radius:12px}
    .w-audio-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s}
    .w-audio-btn:hover{transform:scale(1.08)}
    .w-audio-info{flex:1;min-width:0}
    .w-audio-title{font-weight:700;font-size:.82rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .w-audio-sub{font-size:.7rem;color:var(--muted)}

    /* FOOTER WATERMARK */
    .w-ftr{padding:10px 14px;background:rgba(15,23,42,.95);border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:10px}
    .w-brand{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:4px}
    .w-brand strong{color:#fff}
    .w-cta{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;font-size:.75rem;text-decoration:none;transition:all .2s;box-shadow:0 0 12px rgba(99,102,241,.3)}
    .w-cta:hover{transform:translateY(-1px);box-shadow:0 0 18px rgba(99,102,241,.5)}

    /* SPINNER */
    .spinner{width:30px;height:30px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div class="widget-card" id="card">
  <div class="spinner"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ytId(url){
  if(!url) return null;
  const m=url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
}

const FB = {
  apiKey:"AIzaSyBNB1Whl4DCQPLGiCmAOpW7yXK1uGZXc9c",
  authDomain:"studios-pro.firebaseapp.com",
  projectId:"studios-pro",
  storageBucket:"studios-pro.firebasestorage.app",
  messagingSenderId:"337301506363",
  appId:"1:337301506363:web:68b84724390b830bbf4f1e"
};

let db;
try { firebase.initializeApp(FB); db = firebase.firestore(); } catch(e){}

const urlParams = new URLSearchParams(window.location.search);
const postId = urlParams.get('id') || '';
const postUrl = `https://studios-pro.com/community/post.html?id=${postId}`;

let audioObj = null;

function toggleAudio(btn, src){
  if(!audioObj){
    audioObj = new Audio(src);
    audioObj.onended = () => { btn.textContent = '▶️'; };
  }
  if(audioObj.paused){
    audioObj.play();
    btn.textContent = '⏸️';
  } else {
    audioObj.pause();
    btn.textContent = '▶️';
  }
}

async function loadEmbed(){
  const card = document.getElementById('card');
  if(!postId || !db){
    card.innerHTML = `<div style="margin:auto;text-align:center;color:var(--muted);font-size:.85rem">Creation not found.</div>`;
    return;
  }

  try {
    const doc = await db.collection('studios_community_posts').doc(postId).get();
    if(!doc.exists){
      card.innerHTML = `<div style="margin:auto;text-align:center;color:var(--muted);font-size:.85rem">Creation not found.</div>`;
      return;
    }

    const p = doc.data();
    const name = p.displayName || 'Creator';
    const photo = p.photoURL || '';
    const cat = p.category || 'general';
    const avHtml = photo
      ? `<img src="${esc(photo)}" class="w-av" alt="" onerror="this.remove()">`
      : `<div class="w-av-init">${(name[0]||'?').toUpperCase()}</div>`;

    // Media
    let mediaHtml = '';
    if(p.images && p.images.length){
      mediaHtml += `<div class="w-media-wrap"><img src="${esc(p.images[0])}" class="w-img" alt="" loading="lazy"></div>`;
    }
    const vid = ytId(p.videoUrl);
    if(vid){
      mediaHtml += `<div class="w-media-wrap"><iframe src="https://www.youtube.com/embed/${vid}?rel=0" class="w-video" allowfullscreen loading="lazy"></iframe></div>`;
    }
    if(p.audioUrl){
      mediaHtml += `
        <div class="w-audio">
          <button class="w-audio-btn" onclick="toggleAudio(this, '${esc(p.audioUrl)}')">▶️</button>
          <div class="w-audio-info">
            <div class="w-audio-title">🎵 ${esc(p.audioTitle || 'Audio Track')}</div>
            <div class="w-audio-sub">Click to play audio</div>
          </div>
        </div>`;
    }

    card.innerHTML = `
      <div class="w-hdr">
        <a href="https://studios-pro.com/community/u/${esc(p.uid)}" target="_blank" class="w-author">
          ${avHtml}
          <div class="w-name-wrap">
            <div class="w-name">${esc(name)}</div>
            <span class="w-cat">${esc(cat.toUpperCase())}</span>
          </div>
        </a>
        <a href="https://studios-pro.com/community/" target="_blank" class="w-logo">
          <div class="w-logo-icon">SP</div>
          <div class="w-logo-txt">SP <span>NEXUS</span></div>
        </a>
      </div>

      <div class="w-body">
        ${p.content ? `<div class="w-text">${esc(p.content)}</div>` : ''}
        ${mediaHtml}
      </div>

      <div class="w-ftr">
        <div class="w-brand">⚡ Powered by <strong>SP Nexus</strong></div>
        <a href="${postUrl}" target="_blank" class="w-cta">🔮 View in AR / Full Post ➔</a>
      </div>
    `;
  } catch(e) {
    card.innerHTML = `<div style="margin:auto;text-align:center;color:var(--muted);font-size:.85rem">Error loading creation.</div>`;
  }
}

loadEmbed();
</script>
</body>
</html>
