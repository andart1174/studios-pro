<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pgTitle">Creator Profile — SP Nexus</title>
  <meta name="description" id="pgDesc" content="View this creator's portfolio on SP Nexus by Studios-PRO.">
  <meta property="og:type" content="profile">
  <meta property="og:site_name" content="SP Nexus — Studios-PRO">
  <meta property="og:title" id="ogTitle" content="Creator Profile — SP Nexus">
  <meta property="og:description" id="ogDesc" content="3D creator on SP Nexus by Studios-PRO">
  <meta property="og:image" id="ogImage" content="https://studios-pro.com/sp_nexus_og.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="twTitle" content="Creator Profile — SP Nexus">
  <meta name="twitter:image" id="twImage" content="https://studios-pro.com/sp_nexus_og.jpg">
  <link rel="canonical" id="pgCanonical" href="https://studios-pro.com/community/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#050812;--bg2:#0b1120;--bg3:#111827;
      --accent:#6366f1;--accent2:#8b5cf6;--accent3:#a78bfa;
      --gold:#f59e0b;--green:#10b981;--red:#ef4444;--pink:#ec4899;
      --text:#e2e8f0;--muted:#64748b;
      --border:rgba(99,102,241,.25);--border2:rgba(255,255,255,.07);
      --glow:rgba(99,102,241,.4);
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 10%,rgba(99,102,241,.08) 0%,transparent 45%),radial-gradient(ellipse at 85% 85%,rgba(139,92,246,.06) 0%,transparent 45%);pointer-events:none;z-index:0}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

    /* HEADER */
    .hdr{position:sticky;top:0;z-index:100;background:rgba(5,8,18,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;gap:14px}
    .hlogo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .hlogo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:700;font-size:.8rem;color:#fff;box-shadow:0 0 16px rgba(99,102,241,.5)}
    .hlogo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.05rem;color:#fff}
    .hlogo-text span{background:linear-gradient(135deg,var(--accent3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hback{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted);font-size:.78rem;font-weight:700;text-decoration:none;transition:all .2s;margin-left:auto}
    .hback:hover{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a78bfa}

    /* BANNER */
    .profile-banner{height:200px;background:linear-gradient(135deg,#1a1040,#0d1b4a,#1a0530,#050812);position:relative;overflow:hidden}
    .profile-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(99,102,241,.4) 0%,transparent 60%),radial-gradient(ellipse at 80% 30%,rgba(139,92,246,.3) 0%,transparent 50%)}
    .banner-particles{position:absolute;inset:0;pointer-events:none}
    .bp{position:absolute;border-radius:50%;animation:bpFloat linear infinite}
    @keyframes bpFloat{0%{transform:translateY(0) scale(1);opacity:.6}50%{opacity:.2}100%{transform:translateY(-200px) scale(0.5);opacity:0}}

    /* PROFILE HEADER */
    .profile-wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 20px}
    .profile-info-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:0;margin-top:-60px;overflow:hidden;position:relative}
    .profile-top{display:flex;align-items:flex-end;gap:18px;padding:0 24px 20px;flex-wrap:wrap}
    .profile-av-wrap{position:relative;flex-shrink:0;margin-top:-40px}
    .profile-av{width:100px;height:100px;border-radius:50%;border:4px solid var(--bg2);object-fit:cover;display:block;box-shadow:0 0 0 3px var(--accent),0 8px 32px rgba(0,0,0,.5)}
    .profile-av-init{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:900;font-size:2.2rem;color:#fff;border:4px solid var(--bg2);box-shadow:0 0 0 3px var(--accent),0 8px 32px rgba(0,0,0,.5)}
    .online-ring{position:absolute;bottom:6px;right:6px;width:18px;height:18px;border-radius:50%;background:var(--green);border:3px solid var(--bg2);box-shadow:0 0 8px var(--green)}
    .profile-meta{flex:1;min-width:0;padding-top:16px}
    .profile-name{font-family:'Outfit',sans-serif;font-weight:900;font-size:1.6rem;color:#fff;margin-bottom:6px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .profile-bio{color:var(--muted);font-size:.88rem;margin-bottom:10px;line-height:1.5}
    .profile-stats{display:flex;gap:24px;flex-wrap:wrap}
    .ps{text-align:center}
    .ps-n{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.25rem;color:var(--accent3)}
    .ps-l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    .profile-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:16px}
    .btn-share-profile{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--text);font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s;text-decoration:none;font-family:inherit}
    .btn-share-profile:hover{background:rgba(99,102,241,.15);border-color:var(--accent);color:var(--accent3)}
    .btn-view-nexus{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .2s;text-decoration:none;font-family:inherit}
    .btn-view-nexus:hover{transform:translateY(-1px);box-shadow:0 6px 20px var(--glow)}

    /* TABS */
    .ptabs{display:flex;gap:2px;border-bottom:1px solid var(--border2);padding:0 24px;margin-top:4px}
    .ptab{padding:12px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
    .ptab.active{color:var(--accent3);border-bottom-color:var(--accent)}
    .ptab:hover{color:var(--text)}

    /* GRID */
    .profile-grid-section{padding:20px}
    .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
    @media(min-width:600px){.pgrid{grid-template-columns:repeat(4,1fr)}}
    .pg-item{aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--bg3);cursor:pointer;position:relative;transition:opacity .2s;border:1px solid var(--border2)}
    .pg-item:hover{opacity:.85}
    .pg-item img{width:100%;height:100%;object-fit:cover;display:block}
    .pg-item-3d{display:flex;align-items:center;justify-content:center;font-size:2rem;background:linear-gradient(135deg,rgba(99,102,241,.15),rgba(139,92,246,.08));flex-direction:column;gap:6px}
    .pg-item-3d span{font-size:.65rem;color:var(--accent3);font-weight:700;font-family:'Outfit',sans-serif}
    .pg-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;gap:12px;border-radius:10px}
    .pg-item:hover .pg-overlay{opacity:1}
    .pg-stat{color:#fff;font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:4px}
    .empty-grid{text-align:center;padding:60px 20px;color:var(--muted);grid-column:1/-1}
    .empty-grid .ei{font-size:3rem;margin-bottom:12px}

    /* RANK BADGES */
    .rank-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:800;letter-spacing:.03em}
    .rk-starter{background:rgba(100,116,139,.2);color:#94a3b8;border:1px solid rgba(100,116,139,.3)}
    .rk-creator{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
    .rk-expert{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
    .rk-master{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
    .rk-legend{background:rgba(245,158,11,.2);color:#fbbf24;border:1px solid rgba(245,158,11,.4)}

    /* SHARE SHEET */
    .share-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
    .share-overlay.open{opacity:1;pointer-events:all}
    .share-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-width:500px;padding:24px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
    .share-overlay.open .share-sheet{transform:translateY(0)}
    .ss-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:1rem;color:#fff;margin-bottom:18px;display:flex;align-items:center;gap:8px}
    .ss-url{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:.78rem;color:var(--muted);word-break:break-all;margin-bottom:16px;font-family:monospace}
    .ss-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .ss-btn{display:flex;align-items:center;gap:9px;padding:12px 16px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:.83rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
    .ss-btn:hover{border-color:var(--accent);background:rgba(99,102,241,.12);color:var(--accent3);transform:translateY(-1px)}
    .ss-icon{font-size:1.2rem}
    .ss-close{margin-top:14px;width:100%;padding:11px;border-radius:12px;border:1px solid var(--border2);background:none;color:var(--muted);font-size:.86rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
    .ss-close:hover{border-color:var(--text);color:var(--text)}

    /* LIGHTBOX */
    .lb{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px}
    .lb.open{display:flex}
    .lb img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:12px}
    .lb-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .lb-close:hover{background:rgba(239,68,68,.5)}

    /* TOAST */
    .toast-wrap{position:fixed;bottom:22px;right:22px;z-index:5000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{padding:12px 20px;border-radius:13px;font-size:.84rem;font-weight:500;transform:translateX(120%);transition:transform .3s;max-width:290px;pointer-events:none}
    .toast.show{transform:translateX(0)}
    .toast.success{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.35);color:#34d399}
    .toast.info{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.35);color:var(--accent3)}
    .toast.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);color:#f87171}

    /* LOADING */
    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-wrap{text-align:center;padding:60px;color:var(--muted)}
  </style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <a href="/" class="hlogo" title="Studios-PRO">
    <div class="hlogo-icon">SP</div>
    <div class="hlogo-text">Studios<span>-PRO</span></div>
  </a>
  <a href="/community/" class="hback">
    ← SP Nexus Community
  </a>
</header>

<!-- BANNER -->
<div class="profile-banner" id="profileBanner">
  <div class="banner-particles" id="bannerParticles"></div>
</div>

<!-- PROFILE BODY -->
<div class="profile-wrap">
  <div class="profile-info-card" id="profileCard">
    <div class="loading-wrap"><div class="spinner"></div><div>Loading profile...</div></div>
  </div>
  <div id="profileGridSection" style="margin-top:20px"></div>
</div>

<!-- SHARE SHEET -->
<div class="share-overlay" id="shareOverlay" onclick="closeShare(event)">
  <div class="share-sheet" onclick="event.stopPropagation()">
    <div class="ss-title">🔗 Share Profile</div>
    <div class="ss-url" id="shareUrl"></div>
    <div class="ss-btns">
      <button class="ss-btn" onclick="copyShareUrl()"><span class="ss-icon">📋</span> Copy Link</button>
      <button class="ss-btn" onclick="shareToWhatsApp()"><span class="ss-icon">💬</span> WhatsApp</button>
      <button class="ss-btn" onclick="shareToFacebook()"><span class="ss-icon">👥</span> Facebook</button>
      <button class="ss-btn" onclick="shareToTwitter()"><span class="ss-icon">🐦</span> Twitter / X</button>
    </div>
    <button class="ss-close" onclick="closeShareDirect()">Close</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" onclick="document.getElementById('lb').classList.remove('open')">
  <button class="lb-close" onclick="document.getElementById('lb').classList.remove('open')">✕</button>
  <img src="" alt="" id="lbImg">
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toasts"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBNB1Whl4DCQPLGiCmAOpW7yXK1uGZXc9c",
  authDomain: "studios-pro.firebaseapp.com",
  projectId: "studios-pro",
  storageBucket: "studios-pro.firebasestorage.app",
  messagingSenderId: "337301506363",
  appId: "1:337301506363:web:68b84724390b830bbf4f1e"
};
const COLL = 'studios_community_posts';
const firebase_app = firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

const RANKS = [
  { id:'starter', label:'🌱 Starter', min:0, max:5 },
  { id:'creator', label:'🔥 Creator', min:5, max:20 },
  { id:'expert',  label:'💎 Expert',  min:20, max:60 },
  { id:'master',  label:'🚀 Master',  min:60, max:150 },
  { id:'legend',  label:'👑 Legend',  min:150, max:Infinity }
];

function getRank(n) {
  for (let i = RANKS.length-1; i >= 0; i--) if (n >= RANKS[i].min) return RANKS[i];
  return RANKS[0];
}
function rankHtml(n) {
  const r = getRank(n);
  return `<span class="rank-badge rk-${r.id}">${r.label}</span>`;
}
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function av(u) {
  return (u&&u.photoURL) ? u.photoURL : `https://ui-avatars.com/api/?name=${encodeURIComponent((u&&(u.displayName||u.name))||'User')}&background=6366f1&color=fff&bold=true`;
}

// Toast
function toast(msg, type='info') {
  const w = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  w.appendChild(t);
  requestAnimationFrame(() => { t.classList.add('show'); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3000);
}

// Banner particles
function initParticles() {
  const container = document.getElementById('bannerParticles');
  if (!container) return;
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'bp';
    const size = Math.random() * 6 + 2;
    p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:rgba(${Math.random()>0.5?'99,102,241':'139,92,246'},${Math.random()*.6+.2});animation-duration:${Math.random()*4+3}s;animation-delay:${Math.random()*3}s;`;
    container.appendChild(p);
  }
}
initParticles();

// Parse uid from URL
const urlParams = new URLSearchParams(location.search);
let targetUid = urlParams.get('u') || urlParams.get('uid') || '';
let curTab = 'all';
let profilePosts = [];
let shareCurrentUrl = '';

async function loadProfile() {
  const card = document.getElementById('profileCard');
  if (!targetUid) {
    card.innerHTML = '<div class="loading-wrap"><div class="ei">😕</div><div style="color:var(--muted)">No user specified</div></div>';
    return;
  }

  try {
    // Load user doc
    let userData = null;
    const userDoc = await db.collection('users').doc(targetUid).get();
    if (userDoc.exists) {
      userData = userDoc.data();
    }

    // Load posts
    const postsSnap = await db.collection(COLL).where('uid', '==', targetUid).orderBy('createdAt', 'desc').limit(100).get().catch(async () => {
      return await db.collection(COLL).where('uid', '==', targetUid).limit(100).get();
    });

    profilePosts = [];
    let totalLikes = 0;
    postsSnap.forEach(doc => {
      const d = { id: doc.id, ...doc.data() };
      profilePosts.push(d);
      totalLikes += d.likesCount || 0;
    });

    const displayName = (userData && userData.displayName) || (profilePosts[0] && profilePosts[0].displayName) || 'Creator';
    const photoURL = (userData && userData.photoURL) || (profilePosts[0] && profilePosts[0].photoURL) || null;
    const bio = (userData && userData.bio) || '';
    const postCount = profilePosts.length;
    const rank = getRank(postCount);
    const profileUrl = `${location.origin}/community/u/${targetUid}`;
    shareCurrentUrl = profileUrl;

    // Update meta tags
    document.getElementById('pgTitle').textContent = `${displayName} — SP Nexus`;
    document.getElementById('pgDesc').setAttribute('content', `${displayName} — ${rank.label} creator on SP Nexus. ${postCount} posts, ${totalLikes} likes.`);
    document.getElementById('ogTitle').setAttribute('content', `${displayName} — SP Nexus Creator`);
    document.getElementById('ogDesc').setAttribute('content', `${rank.label} creator. ${postCount} posts · ${totalLikes} likes. Join SP Nexus!`);
    document.getElementById('twTitle').setAttribute('content', `${displayName} — SP Nexus Creator`);
    const firstImg = profilePosts.find(p => p.images && p.images[0]);
    if (firstImg) {
      document.getElementById('ogImage').setAttribute('content', firstImg.images[0]);
      document.getElementById('twImage').setAttribute('content', firstImg.images[0]);
    }
    document.getElementById('pgCanonical').setAttribute('href', profileUrl);

    // Render profile card
    const avatarHtml = photoURL
      ? `<img src="${esc(photoURL)}" class="profile-av" alt="${esc(displayName)}">`
      : `<div class="profile-av-init">${(displayName[0]||'U').toUpperCase()}</div>`;

    card.innerHTML = `
      <div style="padding-top:16px"></div>
      <div class="profile-top">
        <div class="profile-av-wrap">
          ${avatarHtml}
          <div class="online-ring"></div>
        </div>
        <div class="profile-meta">
          <div class="profile-name">
            ${esc(displayName)}
            ${rankHtml(postCount)}
          </div>
          ${bio ? `<div class="profile-bio">${esc(bio)}</div>` : ''}
          <div class="profile-stats">
            <div class="ps"><div class="ps-n">${postCount}</div><div class="ps-l">Posts</div></div>
            <div class="ps"><div class="ps-n">${totalLikes}</div><div class="ps-l">Likes</div></div>
          </div>
          <div class="profile-actions">
            <button class="btn-share-profile" onclick="openShareSheet()">🔗 Share Profile</button>
            <button class="btn-share-profile" style="background:rgba(99,102,241,.18);border-color:var(--accent);color:var(--accent3)" onclick="openDirectMessageFromProfile()">💬 Message</button>
            <a href="/community/" class="btn-view-nexus">🚀 View on SP Nexus</a>
          </div>
        </div>
      </div>
      <div class="ptabs">
        <button class="ptab active" id="tab-all" onclick="switchTab('all',this)">🌐 All Posts (${postCount})</button>
        <button class="ptab" id="tab-3dmodel" onclick="switchTab('3dmodel',this)">🔮 3D Models</button>
        <button class="ptab" id="tab-photo" onclick="switchTab('photo',this)">📸 Photos</button>
        <button class="ptab" id="tab-video" onclick="switchTab('video',this)">🎥 Videos</button>
      </div>
    `;

    renderGrid('all');

  } catch(e) {
    console.error(e);
    card.innerHTML = `<div class="loading-wrap"><div class="ei">⚠️</div><div style="color:var(--muted)">Could not load profile: ${e.message}</div></div>`;
  }
}

function switchTab(tab, btn) {
  curTab = tab;
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid(tab);
}

function renderGrid(tab) {
  const section = document.getElementById('profileGridSection');
  const filtered = tab === 'all' ? profilePosts : profilePosts.filter(p => p.category === tab || (tab === 'photo' && p.images && p.images.length && !p.modelData));
  const has3DFiltered = tab === '3dmodel' ? profilePosts.filter(p => p.modelData) : filtered;
  const finalPosts = tab === '3dmodel' ? has3DFiltered : filtered;

  if (!finalPosts.length) {
    section.innerHTML = `<div class="profile-grid-section"><div class="pgrid"><div class="empty-grid"><div class="ei">✨</div><div style="font-weight:700;color:var(--text);margin-bottom:6px">No posts yet</div></div></div></div>`;
    return;
  }

  let html = '<div class="profile-grid-section"><div class="pgrid">';
  finalPosts.forEach(p => {
    const has3D = p.modelData && (p.modelData.positions || p.modelData.vertices);
    const img = p.images && p.images[0];
    const lk = p.likesCount || 0;
    const cm = p.commentsCount || 0;

    if (has3D) {
      html += `<div class="pg-item pg-item-3d" onclick="openPostPage('${p.id}')">
        🔮<span>3D Model</span>
        <div class="pg-overlay"><span class="pg-stat">❤️ ${lk}</span><span class="pg-stat">💬 ${cm}</span></div>
      </div>`;
    } else if (img) {
      html += `<div class="pg-item" onclick="openLb('${esc(img)}')">
        <img src="${esc(img)}" alt="" loading="lazy">
        <div class="pg-overlay"><span class="pg-stat">❤️ ${lk}</span><span class="pg-stat">💬 ${cm}</span></div>
      </div>`;
    } else {
      html += `<div class="pg-item pg-item-3d" style="font-size:1.4rem" onclick="openPostPage('${p.id}')">
        💬<span style="font-size:.6rem;padding:0 4px;text-align:center;word-break:break-word">${esc((p.content||'').slice(0,40))}</span>
        <div class="pg-overlay"><span class="pg-stat">❤️ ${lk}</span><span class="pg-stat">💬 ${cm}</span></div>
      </div>`;
    }
  });
  html += '</div></div>';
  section.innerHTML = html;
}

function openPostPage(postId) {
  window.open(`/community/post/?id=${postId}`, '_blank');
}
function openLb(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lb').classList.add('open');
}

// Share sheet
function openShareSheet() {
  document.getElementById('shareUrl').textContent = shareCurrentUrl;
  document.getElementById('shareOverlay').classList.add('open');
}
function closeShare(e) { if (e.target === document.getElementById('shareOverlay')) closeShareDirect(); }
function closeShareDirect() { document.getElementById('shareOverlay').classList.remove('open'); }

function copyShareUrl() {
  navigator.clipboard.writeText(shareCurrentUrl).then(() => toast('Link copied! 📋', 'success')).catch(() => toast('Copy failed', 'error'));
}
function shareToWhatsApp() {
  const userName = document.querySelector('.profile-name')?.childNodes[0]?.textContent?.trim() || 'a creator';
  window.open(`https://wa.me/?text=${encodeURIComponent(`🔮 Check out ${userName}'s 3D creations on SP Nexus! ${shareCurrentUrl}`)}`, '_blank');
}
function shareToFacebook() {
  window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareCurrentUrl)}`, '_blank');
}
function shareToTwitter() {
  const userName = document.querySelector('.profile-name')?.childNodes[0]?.textContent?.trim() || 'a creator';
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(`🔮 ${userName} is creating amazing 3D models on SP Nexus! Check it out 👇`)}&url=${encodeURIComponent(shareCurrentUrl)}`, '_blank');
}

function openDirectMessageFromProfile() {
  if (!targetUid) return;
  window.location.href = `/community/?dm=${targetUid}`;
}

// Init
loadProfile();
</script>
