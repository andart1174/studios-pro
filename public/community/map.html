<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SP Nexus — Global Creator Map 🌍</title>
  <meta name="description" content="See where SP Nexus 3D creators are located worldwide. Interactive map showing active creators by rank.">
  <meta property="og:title" content="SP Nexus — Global Creator Map 🌍">
  <meta property="og:description" content="3D creators from around the world on SP Nexus by Studios-PRO">
  <meta property="og:image" content="https://studios-pro.com/sp_nexus_og.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <!-- Leaflet.js -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#050812;--bg2:#0b1120;--bg3:#111827;
      --accent:#6366f1;--accent2:#8b5cf6;--accent3:#a78bfa;
      --gold:#f59e0b;--green:#10b981;--red:#ef4444;--pink:#ec4899;
      --text:#e2e8f0;--muted:#64748b;
      --border:rgba(99,102,241,.25);--border2:rgba(255,255,255,.07);
    }
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}

    .hdr{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(5,8,18,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:62px;display:flex;align-items:center;gap:14px}
    .hlogo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .hlogo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:700;font-size:.8rem;color:#fff;box-shadow:0 0 16px rgba(99,102,241,.5)}
    .hlogo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.05rem;color:#fff}
    .hlogo-text span{background:linear-gradient(135deg,var(--accent3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .map-title{font-family:'Outfit',sans-serif;font-weight:900;font-size:1rem;background:linear-gradient(90deg,#a78bfa,#00f3ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .live-badge{display:flex;align-items:center;gap:6px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:999px;padding:4px 12px;font-size:.74rem;font-weight:700;color:#34d399}
    .live-dot{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(16,185,129,0)}}
    .hback{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted);font-size:.78rem;font-weight:700;text-decoration:none;transition:all .2s;margin-left:auto}
    .hback:hover{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a78bfa}

    /* MAP */
    #map{position:fixed;top:62px;left:0;right:0;bottom:0;z-index:1}
    .leaflet-container{background:#050812 !important}
    .leaflet-tile{filter:brightness(.25) saturate(.4) hue-rotate(200deg)}

    /* LEGEND */
    .legend{position:fixed;bottom:20px;left:20px;z-index:500;background:rgba(5,8,18,.9);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:14px 18px;pointer-events:none}
    .legend-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:.76rem;color:var(--text);margin-bottom:6px}
    .legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}

    /* STATS PANEL */
    .stats-panel{position:fixed;top:82px;right:20px;z-index:500;background:rgba(5,8,18,.9);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:14px;padding:14px 18px;min-width:200px}
    .stats-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
    .stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border2)}
    .stat-row:last-child{border:none}
    .stat-lbl{color:var(--muted);font-size:.78rem}
    .stat-val{font-family:'Outfit',sans-serif;font-weight:800;font-size:.9rem;color:var(--accent3)}

    /* CREATOR POPUP */
    .creator-popup{background:var(--bg2) !important;border:1px solid var(--border) !important;border-radius:14px !important;box-shadow:0 8px 32px rgba(0,0,0,.7) !important;padding:0 !important;min-width:220px;overflow:hidden}
    .creator-popup .leaflet-popup-content-wrapper{background:transparent !important;border:none !important;box-shadow:none !important;border-radius:0 !important;padding:0 !important}
    .creator-popup .leaflet-popup-content{margin:0 !important;width:auto !important}
    .creator-popup .leaflet-popup-tip-container{display:none}
    .cp-inner{padding:14px 16px}
    .cp-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .cp-av{width:42px;height:42px;border-radius:50%;border:2px solid var(--accent);object-fit:cover}
    .cp-av-init{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;font-size:1rem;color:#fff;border:2px solid var(--accent);flex-shrink:0}
    .cp-info{flex:1;min-width:0}
    .cp-name{font-weight:700;font-size:.9rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cp-country{font-size:.72rem;color:var(--muted);margin-top:2px}
    .cp-stats{display:flex;gap:14px;margin-bottom:10px}
    .cp-stat{font-size:.72rem;color:var(--muted)}
    .cp-stat strong{color:var(--text)}
    .cp-post-preview{border-radius:8px;overflow:hidden;margin-bottom:10px}
    .cp-post-preview img{width:100%;height:80px;object-fit:cover;display:block}
    .cp-actions{display:flex;gap:8px}
    .cp-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:.73rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center}
    .cp-btn:hover{border-color:var(--accent);background:rgba(99,102,241,.15);color:var(--accent3)}
    .cp-btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent);color:#fff}
    .cp-btn.primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px var(--glow)}

    /* CUSTOM MARKERS */
    .nexus-marker{position:relative;cursor:pointer}
    .nm-ring{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2.5px solid;animation:nmPulse 2.5s ease-in-out infinite}
    @keyframes nmPulse{0%,100%{box-shadow:0 0 0 0 currentColor}50%{box-shadow:0 0 0 8px transparent}}
    .nm-av{width:26px;height:26px;border-radius:50%;object-fit:cover}
    .nm-init{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;font-size:.7rem;color:#fff}

    /* LOADING OVERLAY */
    .map-loading{position:fixed;inset:62px 0 0 0;z-index:600;background:rgba(5,8,18,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:var(--muted)}
    .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .ml-text{font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;background:linear-gradient(90deg,var(--accent3),#00f3ff);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  </style>
</head>
<body>

<header class="hdr">
  <a href="/" class="hlogo">
    <div class="hlogo-icon">SP</div>
    <div class="hlogo-text">Studios<span>-PRO</span></div>
  </a>
  <div class="map-title">🌍 NEXUS GLOBAL MAP</div>
  <div class="live-badge"><div class="live-dot"></div> LIVE</div>
  <a href="/community/" class="hback">← SP Nexus</a>
</header>

<div id="map"></div>

<!-- LOADING -->
<div class="map-loading" id="mapLoading">
  <div class="spinner"></div>
  <div class="ml-text">Locating creators worldwide...</div>
</div>

<!-- LEGEND -->
<div class="legend">
  <div class="legend-title">Rank Legend</div>
  <div class="legend-item"><div class="legend-dot" style="background:#94a3b8;box-shadow:0 0 6px #94a3b8"></div> 🌱 Starter</div>
  <div class="legend-item"><div class="legend-dot" style="background:#34d399;box-shadow:0 0 6px #34d399"></div> 🔥 Creator</div>
  <div class="legend-item"><div class="legend-dot" style="background:#60a5fa;box-shadow:0 0 6px #60a5fa"></div> 💎 Expert</div>
  <div class="legend-item"><div class="legend-dot" style="background:#a78bfa;box-shadow:0 0 6px #a78bfa"></div> 🚀 Master</div>
  <div class="legend-item"><div class="legend-dot" style="background:#fbbf24;box-shadow:0 0 8px #fbbf24"></div> 👑 Legend</div>
</div>

<!-- STATS PANEL -->
<div class="stats-panel">
  <div class="stats-title">🌐 Nexus Worldwide</div>
  <div class="stat-row"><span class="stat-lbl">👥 Creators on map</span><span class="stat-val" id="statCreators">…</span></div>
  <div class="stat-row"><span class="stat-lbl">🌍 Countries</span><span class="stat-val" id="statCountries">…</span></div>
  <div class="stat-row"><span class="stat-lbl">📝 Total posts</span><span class="stat-val" id="statPosts">…</span></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBNB1Whl4DCQPLGiCmAOpW7yXK1uGZXc9c",
  authDomain: "studios-pro.firebaseapp.com",
  projectId: "studios-pro",
  storageBucket: "studios-pro.firebasestorage.app",
  messagingSenderId: "337301506363",
  appId: "1:337301506363:web:68b84724390b830bbf4f1e"
};
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();

const RANKS = [
  { id:'starter', label:'🌱 Starter', min:0, color:'#94a3b8' },
  { id:'creator', label:'🔥 Creator', min:5, color:'#34d399' },
  { id:'expert',  label:'💎 Expert',  min:20, color:'#60a5fa' },
  { id:'master',  label:'🚀 Master',  min:60, color:'#a78bfa' },
  { id:'legend',  label:'👑 Legend',  min:150, color:'#fbbf24' }
];
function getRank(n) { for (let i=RANKS.length-1;i>=0;i--) if(n>=RANKS[i].min) return RANKS[i]; return RANKS[0]; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Initialize dark map
const map = L.map('map', { zoomControl: true, attributionControl: false }).setView([20, 10], 2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap',
  maxZoom: 18
}).addTo(map);
L.control.attribution({ prefix: false }).addTo(map);

// Custom marker icon function
function createMarkerIcon(user, rank) {
  const color = rank.color;
  const initial = (user.displayName || 'U')[0].toUpperCase();
  const html = `<div style="width:36px;height:36px;border-radius:50%;border:2.5px solid ${color};background:rgba(5,8,18,.9);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 0 ${color};animation:nmPulse 2.5s ease-in-out infinite;cursor:pointer">
    ${user.photoURL
      ? `<img src="${esc(user.photoURL)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover">`
      : `<div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,${color},#6366f1);display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;font-size:.8rem;color:#fff">${initial}</div>`
    }
  </div>`;
  return L.divIcon({ html, className: '', iconSize: [36, 36], iconAnchor: [18, 18] });
}

// Popup HTML builder
function buildPopupHtml(user) {
  const rank = getRank(user.postCount || 0);
  const initial = (user.displayName || 'U')[0].toUpperCase();
  const avHtml = user.photoURL
    ? `<img src="${esc(user.photoURL)}" class="cp-av" alt="">`
    : `<div class="cp-av-init" style="background:linear-gradient(135deg,${rank.color},#6366f1)">${initial}</div>`;

  let previewHtml = '';
  if (user.lastPostImage) {
    previewHtml = `<div class="cp-post-preview"><img src="${esc(user.lastPostImage)}" alt=""></div>`;
  }

  return `<div class="cp-inner">
    <div class="cp-head">
      ${avHtml}
      <div class="cp-info">
        <div class="cp-name">${esc(user.displayName || 'Creator')}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:3px">
          <span style="font-size:.65rem;font-weight:700;padding:1px 7px;border-radius:999px;background:rgba(0,0,0,.3);color:${rank.color}">${rank.label}</span>
          <span style="font-size:.65rem;color:var(--muted)">📍 ${esc(user.country||'Unknown')}</span>
        </div>
      </div>
    </div>
    <div class="cp-stats">
      <div class="cp-stat"><strong>${user.postCount||0}</strong> posts</div>
      <div class="cp-stat"><strong>${user.totalLikes||0}</strong> likes</div>
    </div>
    ${previewHtml}
    <div class="cp-actions">
      <a href="/community/u/${esc(user.uid)}" class="cp-btn primary" target="_blank">👤 Profile</a>
      <a href="/community/" class="cp-btn">🚀 Join Nexus</a>
    </div>
  </div>`;
}

// Default creator locations by country (fallback approximate coords)
const COUNTRY_COORDS = {
  'CA': [56.1304, -106.3468], 'US': [37.0902, -95.7129], 'GB': [55.3781, -3.4360],
  'FR': [46.2276, 2.2137], 'DE': [51.1657, 10.4515], 'IT': [41.8719, 12.5674],
  'ES': [40.4637, -3.7492], 'PT': [39.3999, -8.2245], 'NL': [52.1326, 5.2913],
  'BE': [50.5039, 4.4699], 'CH': [46.8182, 8.2275], 'AT': [47.5162, 14.5501],
  'JP': [36.2048, 138.2529], 'KR': [35.9078, 127.7669], 'CN': [35.8617, 104.1954],
  'BR': [-14.2350, -51.9253], 'MX': [23.6345, -102.5528], 'AR': [-38.4161, -63.6167],
  'AU': [-25.2744, 133.7751], 'ZA': [-30.5595, 22.9375], 'IN': [20.5937, 78.9629],
  'RU': [61.5240, 105.3188], 'UA': [48.3794, 31.1656], 'PL': [51.9194, 19.1451],
  'RO': [45.9432, 24.9668], 'SE': [60.1282, 18.6435], 'NO': [60.4720, 8.4689],
  'DK': [56.2639, 9.5018], 'FI': [61.9241, 25.7482], 'TR': [38.9637, 35.2433],
  'MA': [31.7917, -7.0926], 'NG': [9.0820, 8.6753], 'EG': [26.8206, 30.8025]
};

async function loadCreators() {
  try {
    const usersSnap = await db.collection('users').limit(200).get();
    const postsSnap = await db.collection('studios_community_posts').limit(500).get();

    // Build last post image lookup
    const userLastImage = {};
    const userPostCounts = {};
    postsSnap.forEach(doc => {
      const d = doc.data();
      if (!d.uid) return;
      userPostCounts[d.uid] = (userPostCounts[d.uid] || 0) + 1;
      if (!userLastImage[d.uid] && d.images && d.images[0]) {
        userLastImage[d.uid] = d.images[0];
      }
    });

    const countries = new Set();
    let creatorsOnMap = 0;
    let totalPosts = 0;

    const usersWithLocation = [];
    usersSnap.forEach(doc => {
      const d = { uid: doc.id, ...doc.data() };
      d.postCount = userPostCounts[d.uid] || d.postCount || 0;
      d.lastPostImage = userLastImage[d.uid] || null;
      totalPosts += d.postCount;
      if (d.location && d.location.lat && d.location.lng) {
        usersWithLocation.push({ ...d, lat: d.location.lat, lng: d.location.lng });
        if (d.location.country) countries.add(d.location.country);
      }
    });

    // If no users have location data, generate demo locations from postCount
    if (usersWithLocation.length === 0) {
      const countryCodes = Object.keys(COUNTRY_COORDS);
      usersSnap.forEach((doc, idx) => {
        const d = { uid: doc.id, ...doc.data() };
        d.postCount = userPostCounts[d.uid] || d.postCount || 0;
        d.lastPostImage = userLastImage[d.uid] || null;
        const code = countryCodes[idx % countryCodes.length];
        const [baseLat, baseLng] = COUNTRY_COORDS[code];
        d.lat = baseLat + (Math.random() - 0.5) * 8;
        d.lng = baseLng + (Math.random() - 0.5) * 8;
        d.country = code;
        countries.add(code);
        usersWithLocation.push(d);
      });
    }

    // Add markers
    usersWithLocation.forEach(user => {
      const rank = getRank(user.postCount || 0);
      const marker = L.marker([user.lat, user.lng], {
        icon: createMarkerIcon(user, rank),
        zIndexOffset: user.postCount * 10
      }).addTo(map);

      marker.bindPopup(buildPopupHtml(user), {
        className: 'creator-popup',
        maxWidth: 260,
        offset: [0, -8]
      });
      creatorsOnMap++;
    });

    document.getElementById('statCreators').textContent = creatorsOnMap;
    document.getElementById('statCountries').textContent = countries.size || '—';
    document.getElementById('statPosts').textContent = postsSnap.size;
    document.getElementById('mapLoading').style.display = 'none';

  } catch(e) {
    console.error('Map load error:', e);
    document.getElementById('mapLoading').style.display = 'none';
  }
}

loadCreators();
</script>
</body>
</html>
