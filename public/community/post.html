<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pgTitle">Post — SP Nexus</title>
  <meta name="description" id="pgDesc" content="View this post on SP Nexus by Studios-PRO.">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="SP Nexus — Studios-PRO">
  <meta property="og:title" id="ogTitle" content="Post — SP Nexus">
  <meta property="og:description" id="ogDesc" content="SP Nexus — 3D Creator Community">
  <meta property="og:image" id="ogImage" content="https://studios-pro.com/sp_nexus_og.jpg">
  <meta property="og:url" id="ogUrl" content="https://studios-pro.com/community/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="twTitle" content="Post — SP Nexus">
  <meta name="twitter:image" id="twImage" content="https://studios-pro.com/sp_nexus_og.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#050812;--bg2:#0b1120;--bg3:#111827;
      --accent:#6366f1;--accent2:#8b5cf6;--accent3:#a78bfa;
      --gold:#f59e0b;--green:#10b981;--red:#ef4444;--pink:#ec4899;
      --text:#e2e8f0;--muted:#64748b;
      --border:rgba(99,102,241,.25);--border2:rgba(255,255,255,.07);
      --glow:rgba(99,102,241,.4);
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 10%,rgba(99,102,241,.08) 0%,transparent 45%),radial-gradient(ellipse at 85% 85%,rgba(139,92,246,.06) 0%,transparent 45%);pointer-events:none;z-index:0}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

    .hdr{position:sticky;top:0;z-index:100;background:rgba(5,8,18,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;gap:14px}
    .hlogo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .hlogo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:700;font-size:.8rem;color:#fff;box-shadow:0 0 16px rgba(99,102,241,.5)}
    .hlogo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.05rem;color:#fff}
    .hlogo-text span{background:linear-gradient(135deg,var(--accent3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hback{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted);font-size:.78rem;font-weight:700;text-decoration:none;transition:all .2s;margin-left:auto}
    .hback:hover{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#a78bfa}

    .wrap{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:24px 20px}

    .post-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;overflow:hidden}
    .pc-head{display:flex;align-items:center;gap:12px;padding:18px 20px 0}
    .pc-av{width:50px;height:50px;border-radius:50%;border:2px solid var(--accent);object-fit:cover}
    .pc-av-init{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:800;font-size:1.1rem;color:#fff;border:2px solid var(--accent)}
    .pc-meta{flex:1}
    .pc-name{font-weight:700;font-size:.95rem;color:#fff;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .pc-time{font-size:.73rem;color:var(--muted);margin-top:2px}
    .pc-body{padding:16px 20px}
    .pc-content{color:#cbd5e1;line-height:1.8;font-size:.93rem;white-space:pre-wrap;word-break:break-word;margin-bottom:14px}
    .pc-imgs{border-radius:14px;overflow:hidden;margin-bottom:14px}
    .pc-imgs img{width:100%;max-height:520px;object-fit:cover;cursor:pointer;display:block}
    .pc-video{border-radius:14px;overflow:hidden;aspect-ratio:16/9;margin-bottom:14px}
    .pc-video iframe{width:100%;height:100%;border:none}
    .pc-3d{height:380px;background:#030712;border-radius:14px;position:relative;cursor:grab;overflow:hidden;margin-bottom:14px}
    .pc-3d:active{cursor:grabbing}
    .pc-3d canvas{display:block;width:100%;height:100%}
    .p-3d-badge{position:absolute;top:10px;left:10px;background:rgba(99,102,241,.85);backdrop-filter:blur(6px);border:1px solid rgba(99,102,241,.5);color:#fff;font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:999px;display:flex;align-items:center;gap:5px;font-family:'Orbitron',monospace;z-index:2}
    .p-3d-hint{position:absolute;bottom:10px;right:10px;color:rgba(255,255,255,.5);font-size:.68rem;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);padding:3px 8px;border-radius:6px;z-index:2;pointer-events:none}

    .pc-footer{display:flex;align-items:center;gap:4px;padding:14px 20px;border-top:1px solid var(--border2);flex-wrap:wrap}
    .act-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:none;background:none;color:var(--muted);font-size:.83rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
    .act-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
    .act-btn.liked{color:#f43f5e}
    .act-btn svg{width:17px;height:17px;flex-shrink:0}

    /* SHARE SHEET */
    .share-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:2000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
    .share-overlay.open{opacity:1;pointer-events:all}
    .share-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-width:500px;padding:24px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
    .share-overlay.open .share-sheet{transform:translateY(0)}
    .ss-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:1rem;color:#fff;margin-bottom:18px;display:flex;align-items:center;gap:8px}
    .ss-url{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:.78rem;color:var(--muted);word-break:break-all;margin-bottom:16px;font-family:monospace}
    .ss-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .ss-btn{display:flex;align-items:center;gap:9px;padding:12px 16px;border-radius:12px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:.83rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
    .ss-btn:hover{border-color:var(--accent);background:rgba(99,102,241,.12);color:var(--accent3);transform:translateY(-1px)}
    .ss-icon{font-size:1.2rem}
    .ss-close{margin-top:14px;width:100%;padding:11px;border-radius:12px;border:1px solid var(--border2);background:none;color:var(--muted);font-size:.86rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
    .ss-close:hover{border-color:var(--text);color:var(--text)}

    /* RANK BADGES */
    .rank-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:999px;font-size:.68rem;font-weight:800;letter-spacing:.03em}
    .rk-starter{background:rgba(100,116,139,.2);color:#94a3b8;border:1px solid rgba(100,116,139,.3)}
    .rk-creator{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
    .rk-expert{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
    .rk-master{background:rgba(139,92,246,.15);color:#a78bfa;border:1px solid rgba(139,92,246,.3)}
    .rk-legend{background:rgba(245,158,11,.2);color:#fbbf24;border:1px solid rgba(245,158,11,.4)}

    /* CAT BADGES */
    .cat-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;font-size:.67rem;font-weight:700}
    .cat-showcase{background:rgba(16,185,129,.15);color:#34d399}
    .cat-3dmodel{background:rgba(99,102,241,.15);color:var(--accent3)}
    .cat-hologram{background:rgba(59,130,246,.15);color:#60a5fa}
    .cat-photo{background:rgba(236,72,153,.15);color:#f472b6}
    .cat-video{background:rgba(239,68,68,.15);color:#f87171}
    .cat-challenge{background:rgba(245,158,11,.15);color:#fbbf24}
    .cat-general{background:rgba(148,163,184,.1);color:#94a3b8}

    /* "More posts from" */
    .more-from{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:18px 20px;margin-top:20px}
    .more-from-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:.88rem;color:var(--accent3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .more-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .mg-item{aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--bg3);cursor:pointer;transition:opacity .2s;border:1px solid var(--border2)}
    .mg-item:hover{opacity:.8}
    .mg-item img{width:100%;height:100%;object-fit:cover;display:block}
    .mg-item-3d{display:flex;align-items:center;justify-content:center;font-size:1.6rem}

    /* LIGHTBOX */
    .lb{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px}
    .lb.open{display:flex}
    .lb img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:12px}
    .lb-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

    /* TOAST */
    .toast-wrap{position:fixed;bottom:22px;right:22px;z-index:5000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
    .toast{padding:12px 20px;border-radius:13px;font-size:.84rem;font-weight:500;transform:translateX(120%);transition:transform .3s;max-width:290px}
    .toast.show{transform:translateX(0)}
    .toast.success{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.35);color:#34d399}
    .toast.info{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.35);color:var(--accent3)}
    .toast.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);color:#f87171}

    .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-wrap{text-align:center;padding:60px;color:var(--muted)}
  </style>
</head>
<body>

<header class="hdr">
  <a href="/" class="hlogo">
    <div class="hlogo-icon">SP</div>
    <div class="hlogo-text">Studios<span>-PRO</span></div>
  </a>
  <a href="/community/" class="hback">← SP Nexus</a>
</header>

<div class="wrap">
  <div id="postContainer">
    <div class="loading-wrap"><div class="spinner"></div><div>Loading post...</div></div>
  </div>
  <div id="moreFromSection"></div>
</div>

<!-- SHARE SHEET -->
<div class="share-overlay" id="shareOverlay" onclick="closeShare(event)">
  <div class="share-sheet" onclick="event.stopPropagation()">
    <div class="ss-title">🔗 Share Post</div>
    <div class="ss-url" id="shareUrl"></div>
    <div class="ss-btns">
      <button class="ss-btn" onclick="copyShareUrl()"><span class="ss-icon">📋</span> Copy Link</button>
      <button class="ss-btn" onclick="shareToWhatsApp()"><span class="ss-icon">💬</span> WhatsApp</button>
      <button class="ss-btn" onclick="shareToFacebook()"><span class="ss-icon">👥</span> Facebook</button>
      <button class="ss-btn" onclick="shareToTwitter()"><span class="ss-icon">🐦</span> Twitter / X</button>
    </div>
    <button class="ss-close" onclick="closeShareDirect()">Close</button>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lb" id="lb" onclick="document.getElementById('lb').classList.remove('open')">
  <button class="lb-close">✕</button>
  <img src="" alt="" id="lbImg">
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toasts"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBNB1Whl4DCQPLGiCmAOpW7yXK1uGZXc9c",
  authDomain: "studios-pro.firebaseapp.com",
  projectId: "studios-pro",
  storageBucket: "studios-pro.firebasestorage.app",
  messagingSenderId: "337301506363",
  appId: "1:337301506363:web:68b84724390b830bbf4f1e"
};
const COLL = 'studios_community_posts';
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();

const RANKS = [
  { id:'starter', label:'🌱 Starter', min:0 },
  { id:'creator', label:'🔥 Creator', min:5 },
  { id:'expert',  label:'💎 Expert',  min:20 },
  { id:'master',  label:'🚀 Master',  min:60 },
  { id:'legend',  label:'👑 Legend',  min:150 }
];
function getRank(n) { for (let i=RANKS.length-1;i>=0;i--) if(n>=RANKS[i].min) return RANKS[i]; return RANKS[0]; }
function rankHtml(n) { const r=getRank(n); return `<span class="rank-badge rk-${r.id}">${r.label}</span>`; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function av(p) { return p.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(p.displayName||'U')}&background=6366f1&color=fff&bold=true`; }
function catBadge(cat) {
  const M={showcase:['cat-showcase','🏆 Showcase'],'3dmodel':['cat-3dmodel','🔮 3D Model'],hologram:['cat-hologram','✨ Hologram'],photo:['cat-photo','📸 Photo'],video:['cat-video','🎥 Video'],challenge:['cat-challenge','🏅 Challenge'],general:['cat-general','💬 General']};
  const [cls,lbl]=M[cat]||['cat-general','💬 General'];
  return `<span class="cat-badge ${cls}">${lbl}</span>`;
}
function timeAgo(ts) {
  if(!ts) return '';
  const d=ts.toDate?ts.toDate():new Date(ts);
  const s=(Date.now()-d)/1000;
  if(s<60) return `${~~s}s ago`;
  if(s<3600) return `${~~(s/60)}m ago`;
  if(s<86400) return `${~~(s/3600)}h ago`;
  return `${~~(s/86400)}d ago`;
}
function ytId(url) { if(!url) return null; const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/]+)/); return m?m[1]:null; }

function toast(msg,type='info') {
  const w=document.getElementById('toasts');
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  w.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),400);},3000);
}

const urlParams = new URLSearchParams(location.search);
const postId = urlParams.get('id') || urlParams.get('post');
let curShareUrl = '';
let curUser = null;

auth.onAuthStateChanged(u => { curUser = u; });

async function loadPost() {
  const container = document.getElementById('postContainer');
  if (!postId) {
    container.innerHTML = '<div class="loading-wrap">No post ID specified. <a href="/community/" style="color:var(--accent3)">← Go to SP Nexus</a></div>';
    return;
  }

  try {
    const doc = await db.collection(COLL).doc(postId).get();
    if (!doc.exists) {
      container.innerHTML = '<div class="loading-wrap"><div class="spinner" style="display:none"></div>Post not found or deleted. <a href="/community/" style="color:var(--accent3)">← Go to SP Nexus</a></div>';
      return;
    }
    const p = { id: doc.id, ...doc.data() };
    const postUrl = `${location.origin}/community/post/?id=${postId}`;
    curShareUrl = postUrl;

    // Update meta tags
    const title = p.content ? p.content.slice(0,80) : (p.category ? p.category : 'Post');
    const desc = `${p.displayName||'Creator'} on SP Nexus · ${p.likesCount||0} likes · ${p.commentsCount||0} comments`;
    document.getElementById('pgTitle').textContent = `${title} — SP Nexus`;
    document.getElementById('pgDesc').setAttribute('content', desc);
    document.getElementById('ogTitle').setAttribute('content', title);
    document.getElementById('ogDesc').setAttribute('content', desc);
    document.getElementById('ogUrl').setAttribute('content', postUrl);
    document.getElementById('twTitle').setAttribute('content', title);
    if (p.images && p.images[0]) {
      document.getElementById('ogImage').setAttribute('content', p.images[0]);
      document.getElementById('twImage').setAttribute('content', p.images[0]);
    }

    renderPost(p, container);
    loadMoreFrom(p.uid, p.id);
  } catch(e) {
    container.innerHTML = `<div class="loading-wrap">Error: ${e.message} <a href="/community/" style="color:var(--accent3)">← Go to SP Nexus</a></div>`;
  }
}

function renderPost(p, container) {
  const has3D = p.modelData && (p.modelData.positions || p.modelData.vertices);
  const vid = ytId(p.videoUrl);
  const liked = false; // Simplified — full like functionality in community/index.html

  let mediaHtml = '';
  if (has3D) {
    mediaHtml = `<div class="pc-3d" id="viewer3d">
      <div class="p-3d-badge">🔮 3D PREVIEW</div>
      <div class="p-3d-hint">Drag to rotate</div>
    </div>`;
  } else if (p.images && p.images.length) {
    mediaHtml = `<div class="pc-imgs">` + p.images.slice(0,4).map(img => `<img src="${esc(img)}" alt="" loading="lazy" onclick="openLb('${esc(img)}')" style="margin-bottom:3px">`).join('') + `</div>`;
  } else if (vid) {
    mediaHtml = `<div class="pc-video"><iframe src="https://www.youtube.com/embed/${vid}?rel=0" allowfullscreen loading="lazy"></iframe></div>`;
  }

  const avatarHtml = p.photoURL
    ? `<img src="${esc(p.photoURL)}" class="pc-av" alt="">`
    : `<div class="pc-av-init">${(p.displayName||'U')[0].toUpperCase()}</div>`;

  container.innerHTML = `<div class="post-card">
    <div class="pc-head">
      ${avatarHtml}
      <div class="pc-meta">
        <div class="pc-name">
          <a href="/community/u/${esc(p.uid)}" style="color:#fff;text-decoration:none;font-weight:700">${esc(p.displayName||'User')}</a>
          ${rankHtml(p.userPostCount||0)}
          ${catBadge(p.category)}
        </div>
        <div class="pc-time">${timeAgo(p.createdAt)}</div>
      </div>
    </div>
    <div class="pc-body">
      ${p.content ? `<div class="pc-content">${esc(p.content)}</div>` : ''}
      ${mediaHtml}
    </div>
    <div class="pc-footer">
      <button class="act-btn" id="likeBtn" onclick="window.location='/community/'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        ${p.likesCount||0}
      </button>
      <button class="act-btn" onclick="window.location='/community/#post-${p.id}'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        ${p.commentsCount||0}
      </button>
      <button class="act-btn" style="margin-left:auto" onclick="openShareSheet()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
      <a href="/community/" class="act-btn" style="text-decoration:none">🚀 Join SP Nexus</a>
    </div>
  </div>`;

  if (has3D) {
    setTimeout(() => init3DViewer(p.modelData), 100);
  }
}

function init3DViewer(md) {
  try {
    const container = document.getElementById('viewer3d');
    if (!container || !md) return;
    const W = container.clientWidth || 640, H = 380;
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    container.appendChild(renderer.domElement);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, W/H, 0.01, 1000);
    camera.position.set(0, 2, 8);
    const geo = new THREE.BufferGeometry();
    const pos = md.positions || md.vertices;
    if (!pos) return;
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
    if (md.normals) geo.setAttribute('normal', new THREE.BufferAttribute(new Float32Array(md.normals), 3));
    else geo.computeVertexNormals();
    if (md.indices) geo.setIndex(Array.from(md.indices));
    const color = md.color ? parseInt(md.color.replace('#',''), 16) : 0x6366f1;
    const mat = new THREE.MeshStandardMaterial({ color, metalness:.3, roughness:.6, side:THREE.DoubleSide });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);
    geo.computeBoundingBox();
    const box = geo.boundingBox, center = new THREE.Vector3();
    box.getCenter(center); mesh.position.sub(center);
    const size = new THREE.Vector3(); box.getSize(size);
    const maxD = Math.max(size.x, size.y, size.z) || 1;
    mesh.scale.setScalar(5/maxD);
    scene.add(new THREE.AmbientLight(0xffffff, .7));
    const dl = new THREE.DirectionalLight(0x8b5cf6, 1.4); dl.position.set(5,10,8); scene.add(dl);
    let drag=false, px=0, py=0;
    container.addEventListener('mousedown', e=>{drag=true;px=e.clientX;py=e.clientY;});
    window.addEventListener('mouseup',()=>drag=false);
    window.addEventListener('mousemove',e=>{if(!drag)return;mesh.rotation.y+=(e.clientX-px)*.012;mesh.rotation.x+=(e.clientY-py)*.012;px=e.clientX;py=e.clientY;});
    let lt=null;
    container.addEventListener('touchstart',e=>{lt=e.touches[0];},{passive:true});
    container.addEventListener('touchmove',e=>{if(!lt)return;const tc=e.touches[0];mesh.rotation.y+=(tc.clientX-lt.clientX)*.012;mesh.rotation.x+=(tc.clientY-lt.clientY)*.012;lt=tc;},{passive:true});
    const animate=()=>{requestAnimationFrame(animate);if(!drag) mesh.rotation.y+=.009;renderer.render(scene,camera);};
    animate();
  } catch(e){ console.warn('3D viewer error:',e); }
}

async function loadMoreFrom(uid, excludeId) {
  try {
    const snap = await db.collection(COLL).where('uid','==',uid).limit(7).get().catch(()=>null);
    if (!snap || snap.empty) return;
    const others = [];
    snap.forEach(doc => { if (doc.id !== excludeId) others.push({id:doc.id,...doc.data()}); });
    if (!others.length) return;
    const name = others[0].displayName || 'this creator';
    let html = `<div class="more-from"><div class="more-from-title">🔮 More from ${esc(name)}</div><div class="more-grid">`;
    others.slice(0,6).forEach(p => {
      const img = p.images && p.images[0];
      const has3D = p.modelData && (p.modelData.positions||p.modelData.vertices);
      if (img) {
        html += `<div class="mg-item" onclick="window.location='/community/post/?id=${p.id}'"><img src="${esc(img)}" loading="lazy" alt=""></div>`;
      } else {
        html += `<div class="mg-item mg-item-3d" onclick="window.location='/community/post/?id=${p.id}'">${has3D?'🔮':'💬'}</div>`;
      }
    });
    html += `</div><a href="/community/u/${esc(uid)}" style="display:block;text-align:center;margin-top:14px;color:var(--accent3);text-decoration:none;font-size:.83rem;font-weight:700">View full profile →</a></div>`;
    document.getElementById('moreFromSection').innerHTML = html;
  } catch(e){}
}
