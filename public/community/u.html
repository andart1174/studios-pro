<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pgTitle">Creator Gallery — SP Nexus</title>
  <meta name="description" id="pgDesc" content="Discover this creator's portfolio on SP Nexus by Studios-PRO.">
  <meta property="og:type" content="profile">
  <meta property="og:site_name" content="SP Nexus — Studios-PRO">
  <meta property="og:title" id="ogTitle" content="Creator Gallery — SP Nexus">
  <meta property="og:description" id="ogDesc" content="Explore 3D models, music, architecture and more on SP Nexus.">
  <meta property="og:image" id="ogImage" content="https://studios-pro.com/sp_nexus_og.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="twTitle" content="Creator Gallery — SP Nexus">
  <meta name="twitter:image" content="https://studios-pro.com/sp_nexus_og.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800;900&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#050812;--bg2:#0b1120;--bg3:#111827;
      --accent:#6366f1;--accent2:#8b5cf6;--accent3:#a78bfa;
      --gold:#f59e0b;--green:#10b981;--red:#ef4444;--pink:#ec4899;
      --text:#e2e8f0;--muted:#64748b;
      --border:rgba(99,102,241,.25);--border2:rgba(255,255,255,.07);
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(99,102,241,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 85%,rgba(139,92,246,.06) 0%,transparent 50%);pointer-events:none;z-index:0}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

    /* HEADER */
    .hdr{position:sticky;top:0;z-index:100;background:rgba(5,8,18,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;gap:14px}
    .hlogo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .hlogo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:700;font-size:.75rem;color:#fff;box-shadow:0 0 16px rgba(99,102,241,.5)}
    .hlogo-text{font-family:'Outfit',sans-serif;font-weight:800;font-size:1rem;color:#fff}
    .hlogo-text span{background:linear-gradient(135deg,var(--accent3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hback{margin-left:auto;display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted);font-size:.78rem;font-weight:700;text-decoration:none;transition:all .2s}
    .hback:hover{background:rgba(99,102,241,.15);border-color:var(--accent);color:var(--accent3)}
    .lang-btn{padding:5px 10px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--border2);color:var(--muted);font-size:.72rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s}
    .lang-btn:hover{background:rgba(99,102,241,.15);color:var(--accent3)}

    /* WRAP */
    .wrap{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:32px 20px 60px}

    /* PROFILE HERO */
    .profile-hero{background:var(--bg2);border:1px solid var(--border2);border-radius:24px;overflow:hidden;margin-bottom:28px}
    .hero-banner{height:120px;background:linear-gradient(135deg,#0f1729,#1a0f3a,#0f1729);position:relative}
    .hero-banner::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 100%,rgba(99,102,241,.3) 0%,transparent 70%)}
    .hero-body{padding:0 28px 28px;margin-top:-40px;position:relative}
    .hero-av-wrap{position:relative;display:inline-block;margin-bottom:12px}
    .hero-av{width:80px;height:80px;border-radius:50%;border:3px solid var(--bg2);object-fit:cover;background:var(--bg3)}
    .hero-av-init{width:80px;height:80px;border-radius:50%;border:3px solid var(--bg2);background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-weight:900;font-size:1.8rem;color:#fff}
    .online-dot{position:absolute;bottom:4px;right:4px;width:14px;height:14px;background:var(--green);border-radius:50%;border:2px solid var(--bg2)}
    .hero-info{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:14px}
    .hero-name{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.6rem;color:#fff;margin-bottom:4px}
    .hero-rank{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;background:rgba(99,102,241,.15);border:1px solid var(--border);color:var(--accent3);margin-bottom:10px}
    .hero-stats{display:flex;gap:24px;flex-wrap:wrap}
    .stat-item{text-align:center}
    .stat-num{font-family:'Outfit',sans-serif;font-weight:800;font-size:1.3rem;color:#fff}
    .stat-lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    .hero-actions{display:flex;gap:10px;align-items:flex-start}
    .btn-msg{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-weight:700;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s}
    .btn-msg:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(99,102,241,.4)}
    .btn-share{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--text);font-weight:700;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s}
    .btn-share:hover{background:rgba(255,255,255,.1);border-color:var(--border)}

    /* AWARDS ROW */
    .awards-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .award-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--gold)}

    /* TABS */
    .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;padding:4px;background:var(--bg2);border-radius:14px;border:1px solid var(--border2)}
    .tab{padding:8px 16px;border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer;border:none;background:none;color:var(--muted);font-family:inherit;transition:all .2s;white-space:nowrap}
    .tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.4)}
    .tab:hover:not(.active){background:rgba(255,255,255,.06);color:var(--text)}

    /* POST GRID */
    .post-grid{columns:2;column-gap:14px}
    @media(max-width:640px){.post-grid{columns:1}}
    @media(min-width:900px){.post-grid{columns:3}}
    .pg-item{break-inside:avoid;margin-bottom:14px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .25s;animation:fadeUp .35s ease}
    .pg-item:hover{border-color:var(--border);box-shadow:0 8px 24px rgba(0,0,0,.4);transform:translateY(-2px)}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .pg-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
    .pg-body{padding:12px}
    .pg-cat{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.65rem;font-weight:700;margin-bottom:6px}
    .pg-text{font-size:.82rem;color:#cbd5e1;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
    .pg-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border2)}
    .pg-likes{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:4px}
    .pg-time{font-size:.68rem;color:var(--muted)}

    /* PINNED BADGE */
    .pinned-hero{margin-bottom:24px}
    .pinned-label{font-family:'Outfit',sans-serif;font-weight:800;font-size:.8rem;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .pinned-card{background:linear-gradient(135deg,rgba(245,158,11,.06),var(--bg2));border:1px solid rgba(245,158,11,.3);border-radius:16px;padding:18px;display:flex;gap:16px;cursor:pointer;transition:all .25s}
    .pinned-card:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(245,158,11,.15)}
    .pinned-thumb{width:120px;height:90px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:2rem}
    .pinned-info{flex:1;min-width:0}
    .pinned-title{font-weight:700;font-size:.95rem;color:#fff;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .pinned-desc{font-size:.82rem;color:#94a3b8;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

    /* CAT BADGE COLORS */
    .cat-music{background:rgba(236,72,153,.15);color:#f472b6;border:1px solid rgba(236,72,153,.3)}
    .cat-architecture{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
    .cat-sandart{background:rgba(251,191,36,.12);color:#fcd34d;border:1px solid rgba(251,191,36,.25)}
    .cat-mechanics{background:rgba(156,163,175,.12);color:#d1d5db;border:1px solid rgba(156,163,175,.25)}
    .cat-depthmap{background:rgba(6,182,212,.15);color:#22d3ee;border:1px solid rgba(6,182,212,.3)}
    .cat-3dmodel{background:rgba(99,102,241,.2);color:#a5b4fc;border:1px solid rgba(99,102,241,.35)}
    .cat-photo{background:rgba(16,185,129,.15);color:#34d399;border:1px solid rgba(16,185,129,.3)}
    .cat-video{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
    .cat-general{background:rgba(148,163,184,.12);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}

    /* EMPTY / LOADING */
    .empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
    .empty-state div{font-size:2.5rem;margin-bottom:12px}
    .empty-state p{font-size:.9rem}
    .spinner{width:40px;height:40px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* SHARE MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:24px;width:360px;max-width:95vw;animation:fadeUp .25s ease}
    .modal-title{font-family:'Outfit',sans-serif;font-weight:800;font-size:1rem;color:#fff;margin-bottom:16px}
    .share-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .share-btn{padding:10px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--text);font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
    .share-btn:hover{background:rgba(99,102,241,.2);border-color:var(--accent)}
    .share-url{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;font-size:.74rem;color:var(--muted);word-break:break-all;margin-bottom:14px;font-family:monospace}
    .modal-close{width:100%;padding:10px;border-radius:10px;border:1px solid var(--border2);background:none;color:var(--muted);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit}
    .modal-close:hover{background:rgba(255,255,255,.06)}

    /* POST DETAIL MODAL */
    .post-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;padding:20px}
    .post-modal-overlay.open{opacity:1;pointer-events:all}
    .post-modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:640px;max-width:100%;max-height:90vh;overflow-y:auto;animation:fadeUp .25s ease}
    .pm-head{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--border2)}
    .pm-av{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--accent)}
    .pm-av-init{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#fff;border:2px solid var(--accent)}
    .pm-info{flex:1}
    .pm-name{font-weight:700;color:#fff;font-size:.9rem}
    .pm-time{font-size:.72rem;color:var(--muted)}
    .pm-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}
    .pm-close:hover{background:rgba(255,255,255,.08);color:#fff}
    .pm-body{padding:18px 20px}
    .pm-content{color:#cbd5e1;line-height:1.8;font-size:.93rem;white-space:pre-wrap;word-break:break-word;margin-bottom:16px}
    .pm-imgs img{width:100%;border-radius:12px;max-height:400px;object-fit:cover;margin-bottom:12px;display:block}
    .pm-video{border-radius:12px;overflow:hidden;aspect-ratio:16/9;margin-bottom:12px}
    .pm-video iframe{width:100%;height:100%;border:none}

    /* TOAST */
    .toast-wrap{position:fixed;top:80px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast{padding:10px 16px;border-radius:12px;font-size:.82rem;font-weight:600;max-width:280px;animation:slideIn .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .toast.success{background:#065f46;border:1px solid #10b981;color:#6ee7b7}
    .toast.error{background:#7f1d1d;border:1px solid #ef4444;color:#fca5a5}
    .toast.info{background:#1e1b4b;border:1px solid #6366f1;color:#a5b4fc}
    @keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
  </style>
</head>
<body>
<!-- HEADER -->
<header class="hdr">
  <a href="https://studios-pro.com" class="hlogo" title="Studios-PRO Home">
    <div class="hlogo-icon">SP</div>
    <div class="hlogo-text">SP <span>NEXUS</span></div>
  </a>
  <button class="lang-btn" onclick="toggleLang()" id="langBtn">🇫🇷 FR</button>
  <a href="/community/" class="hback">← <span id="txtBack">Community</span></a>
</header>

<!-- TOASTS -->
<div class="toast-wrap" id="toasts"></div>

<!-- SHARE MODAL -->
<div class="modal-overlay" id="shareModal" onclick="if(event.target===this)closeShareModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title">🔗 <span id="shareMTitle">Share Profile</span></div>
    <div class="share-url" id="shareUrl"></div>
    <div class="share-grid">
      <button class="share-btn" onclick="shareCopy()">📋 <span id="sCopy">Copy</span></button>
      <button class="share-btn" onclick="shareWhatsApp()">💬 WhatsApp</button>
      <button class="share-btn" onclick="shareFacebook()">👥 Facebook</button>
      <button class="share-btn" onclick="shareTwitter()">🐦 Twitter / X</button>
      <button class="share-btn" onclick="sharePinterest()" style="color:#e60023;border-color:rgba(230,0,35,.3)">📌 Pinterest</button>
      <button class="share-btn" onclick="shareReddit()" style="color:#ff4500;border-color:rgba(255,69,0,.3)">🔴 Reddit</button>
      <button class="share-btn" onclick="shareEmbed()" style="grid-column:span 2;color:#a78bfa;border-color:rgba(99,102,241,.4)">&lt;/&gt; Embed Gallery Code</button>
    </div>
    <button class="modal-close" onclick="closeShareModal()" id="sMClose">Close</button>
  </div>
</div>

<!-- POST DETAIL MODAL -->
<div class="post-modal-overlay" id="postModal" onclick="if(event.target===this)closePostModal()">
  <div class="post-modal" onclick="event.stopPropagation()">
    <div class="pm-head">
      <div id="pmAvWrap"></div>
      <div class="pm-info">
        <div class="pm-name" id="pmName"></div>
        <div class="pm-time" id="pmTime"></div>
      </div>
      <button class="pm-close" onclick="closePostModal()">✕</button>
    </div>
    <div class="pm-body" id="pmBody"></div>
  </div>
</div>

<!-- MAIN CONTENT -->
<main class="wrap">
  <div id="content">
    <div class="spinner"></div>
  </div>
</main>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ─── i18n ──────────────────────────────────────────────────
let lang = localStorage.getItem('sp_lang') || 'en';
const T = {
  en: {
    back: 'Community', posts: 'Posts', likes: 'Likes', views: 'Views',
    msg: '💬 Message', share: '🔗 Share', loading: 'Loading...',
    noPost: 'No posts yet in this category.',
    all: 'All', music: '🎵 Music', arch: '🏛️ Architecture', sand: '⏳ Sand Art',
    mech: '⚙️ Mechanics', depth: '🖼️ Depth Maps', model: '🔮 3D Models',
    photo: '📸 Photos', video: '🎥 Videos', general: '💬 General',
    pinned: '📌 Featured Project', shareTitle: 'Share Profile',
    copy: 'Copy', close: 'Close', copied: 'Link copied! 📋',
    awards: 'Awards', notFound: 'Creator not found.',
    shareMsg: '🔮 Check out this creator on SP Nexus!'
  },
  fr: {
    back: 'Communauté', posts: 'Projets', likes: 'J\'aimes', views: 'Vues',
    msg: '💬 Message', share: '🔗 Partager', loading: 'Chargement...',
    noPost: 'Aucun projet dans cette catégorie.',
    all: 'Tous', music: '🎵 Musique', arch: '🏛️ Architecture', sand: '⏳ Art du Sable',
    mech: '⚙️ Mécanique', depth: '🖼️ Profondeur', model: '🔮 Modèles 3D',
    photo: '📸 Photos', video: '🎥 Vidéos', general: '💬 Général',
    pinned: '📌 Projet Vedette', shareTitle: 'Partager le Profil',
    copy: 'Copier', close: 'Fermer', copied: 'Lien copié ! 📋',
    awards: 'Récompenses', notFound: 'Créateur introuvable.',
    shareMsg: '🔮 Découvrez ce créateur sur SP Nexus !'
  }
};
function t(k){ return (T[lang]||T.en)[k] || k; }
function toggleLang(){
  lang = lang === 'en' ? 'fr' : 'en';
  localStorage.setItem('sp_lang', lang);
  document.getElementById('langBtn').textContent = lang === 'en' ? '🇫🇷 FR' : '🇬🇧 EN';
  applyLang();
}
function applyLang(){
  document.getElementById('txtBack').textContent = t('back');
  document.getElementById('shareMTitle').textContent = t('shareTitle');
  document.getElementById('sCopy').textContent = t('copy');
  document.getElementById('sMClose').textContent = t('close');
  if (document.getElementById('langBtn'))
    document.getElementById('langBtn').textContent = lang === 'en' ? '🇫🇷 FR' : '🇬🇧 EN';
}
applyLang();

// ─── Toast ─────────────────────────────────────────────────
function toast(msg, type='info'){
  const w = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  w.appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

// ─── Helpers ───────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function timeAgo(ts){
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const s = Math.floor((Date.now()-d)/1000);
  if(s<60) return lang==='fr'?`Il y a ${s}s`:`${s}s ago`;
  if(s<3600) return lang==='fr'?`Il y a ${Math.floor(s/60)}m`:`${Math.floor(s/60)}m ago`;
  if(s<86400) return lang==='fr'?`Il y a ${Math.floor(s/3600)}h`:`${Math.floor(s/3600)}h ago`;
  return lang==='fr'?`Il y a ${Math.floor(s/86400)}j`:`${Math.floor(s/86400)}d ago`;
}
function getRank(cnt){
  const RANKS=[
    {label:'🌱 Starter',min:0,max:5},
    {label:'🔥 Creator',min:5,max:20},
    {label:'💎 Expert',min:20,max:60},
    {label:'🚀 Master',min:60,max:150},
    {label:'🌟 Legend',min:150,max:Infinity}
  ];
  return (RANKS.find(r=>cnt>=r.min&&cnt<r.max)||RANKS[0]).label;
}
function catLabel(c){
  const m={music:t('music'),architecture:t('arch'),sandart:t('sand'),mechanics:t('mech'),
    depthmap:t('depth'),'3dmodel':t('model'),photo:t('photo'),video:t('video'),general:t('general')};
  return m[c]||c||t('general');
}
function catClass(c){
  const m={music:'cat-music',architecture:'cat-architecture',sandart:'cat-sandart',
    mechanics:'cat-mechanics',depthmap:'cat-depthmap','3dmodel':'cat-3dmodel',
    photo:'cat-photo',video:'cat-video',general:'cat-general'};
  return m[c]||'cat-general';
}
function ytId(url){
  if(!url) return null;
  const m=url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
}

const COLL = 'studios_community_posts';

// ─── Get UID from URL ──────────────────────────────────────
function getUid(){
  // Support /community/u/UID (path) or ?uid=UID (query)
  const path = window.location.pathname;
  const match = path.match(/\/community\/u\/([^/?#]+)/);
  if(match) return match[1];
  return new URLSearchParams(window.location.search).get('uid') || '';
}

// ─── State ─────────────────────────────────────────────────
let allPosts = [];
let activeTab = 'all';
let creatorData = null;

// ─── Tab categories ─────────────────────────────────────────
const TABS = ['all','music','architecture','sandart','mechanics','depthmap','3dmodel','photo','video','general'];
function tabLabel(c){
  const m={all:t('all'),music:t('music'),architecture:t('arch'),sandart:t('sand'),
    mechanics:t('mech'),depthmap:t('depth'),'3dmodel':t('model'),photo:t('photo'),
    video:t('video'),general:t('general')};
  return m[c]||c;
}

// ─── Main Load ─────────────────────────────────────────────
async function loadProfile(){
  const uid = getUid();
  if(!uid || !db){
    document.getElementById('content').innerHTML = `<div class="empty-state"><div>🔍</div><p>${t('notFound')}</p></div>`;
    return;
  }

  // Load user document
  let user = null;
  try {
    const uDoc = await db.collection('users').doc(uid).get();
    if(uDoc.exists) user = uDoc.data();
  } catch(e){}

  // Load all posts by this user
  try {
    const snap = await db.collection(COLL).get();
    allPosts = [];
    snap.forEach(d => {
      const p = d.data();
      if(p.uid === uid) allPosts.push({ id: d.id, ...p });
    });
    allPosts.sort((a,b) => {
      const at = a.createdAt?.toDate?.()?.getTime() || 0;
      const bt = b.createdAt?.toDate?.()?.getTime() || 0;
      return bt - at;
    });
  } catch(e){ console.error(e); }

  const displayName = user?.displayName || allPosts[0]?.displayName || 'Creator';
  const photoURL = user?.photoURL || allPosts[0]?.photoURL || '';
  const postCount = allPosts.length;
  const totalLikes = allPosts.reduce((s,p)=> s + (p.likesCount||(Array.isArray(p.likes)?p.likes.length:0)),0);
  const rank = getRank(postCount);

  creatorData = { uid, displayName, photoURL, postCount, totalLikes };

  // Update SEO meta
  document.getElementById('pgTitle').textContent = `${displayName} — SP Nexus`;
  document.getElementById('pgDesc').content = `Explore ${displayName}'s creative portfolio on SP Nexus by Studios-PRO.`;
  document.getElementById('ogTitle').content = `${displayName} — Creator on SP Nexus`;
  document.getElementById('ogDesc').content = `${postCount} projects · ${totalLikes} likes`;
  document.getElementById('twTitle').content = `${displayName} — SP Nexus Creator`;
  if(photoURL){ document.getElementById('ogImage').content = photoURL; }

  // Find pinned/latest post as featured
  const featured = allPosts.find(p=>p.pinned) || (allPosts[0]||null);

  // Build avatar HTML
  const avHtml = photoURL
    ? `<img src="${esc(photoURL)}" class="hero-av" alt="${esc(displayName)}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
      + `<div class="hero-av-init" style="display:none">${(displayName[0]||'?').toUpperCase()}</div>`
    : `<div class="hero-av-init">${(displayName[0]||'?').toUpperCase()}</div>`;

  // Awards placeholder (week winner badges if any)
  let awardsHtml = '';
  const wins = allPosts.filter(p=>p.weeklyWinner).length;
  if(wins > 0) awardsHtml = `<div class="awards-row"><span class="award-badge">🏆 ${wins} ${t('awards')}</span></div>`;

  // Featured project
  let featuredHtml = '';
  if(featured){
    const fImg = (featured.images&&featured.images[0]) ? `<img src="${esc(featured.images[0])}" class="pinned-thumb" alt="" onerror="this.innerHTML='🔮'">` : `<div class="pinned-thumb" style="background:var(--bg3)">🔮</div>`;
    featuredHtml = `
      <div class="pinned-hero">
        <div class="pinned-label">${t('pinned')}</div>
        <div class="pinned-card" onclick="openPost('${featured.id}')">
          ${fImg}
          <div class="pinned-info">
            <div class="pinned-title">${esc(featured.content||'Untitled Project').slice(0,60)}</div>
            <div class="pinned-desc">${esc(featured.content||'').slice(0,120)}</div>
            <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
              <span class="pg-cat ${catClass(featured.category)}">${catLabel(featured.category)}</span>
              <span style="font-size:.7rem;color:var(--muted)">❤️ ${featured.likesCount||(Array.isArray(featured.likes)?featured.likes.length:0)}</span>
            </div>
          </div>
        </div>
      </div>`;
  }

  // Build tabs
  const usedCats = [...new Set(allPosts.map(p=>p.category||'general'))];
  const tabsHtml = TABS.filter(c=> c==='all' || usedCats.includes(c)).map(c=>
    `<button class="tab${c==='all'?' active':''}" onclick="filterTab('${c}')" id="tab-${c}">${tabLabel(c)}</button>`
  ).join('');

  document.getElementById('content').innerHTML = `
    <div class="profile-hero">
      <div class="hero-banner"></div>
      <div class="hero-body">
        <div class="hero-info">
          <div>
            <div class="hero-av-wrap">${avHtml}</div>
            <div class="hero-name">${esc(displayName)}</div>
            <div class="hero-rank">${rank}</div>
            <div class="hero-stats">
              <div class="stat-item"><div class="stat-num">${postCount}</div><div class="stat-lbl">${t('posts')}</div></div>
              <div class="stat-item"><div class="stat-num">${totalLikes}</div><div class="stat-lbl">${t('likes')}</div></div>
            </div>
            ${awardsHtml}
          </div>
          <div class="hero-actions">
            <button class="btn-msg" onclick="goMessage()">${t('msg')}</button>
            <button class="btn-share" onclick="openShareModal()">${t('share')}</button>
          </div>
        </div>
      </div>
    </div>

    ${featuredHtml}

    <div class="tabs">${tabsHtml}</div>
    <div class="post-grid" id="postGrid"></div>
  `;

  renderGrid('all');
}

// ─── Render grid ───────────────────────────────────────────
function renderGrid(cat){
  activeTab = cat;
  // Update tab highlight
  TABS.forEach(c => {
    const el = document.getElementById(`tab-${c}`);
    if(el) el.classList.toggle('active', c===cat);
  });

  const filtered = cat==='all' ? allPosts : allPosts.filter(p=>(p.category||'general')===cat);
  const grid = document.getElementById('postGrid');
  if(!grid) return;

  if(!filtered.length){
    grid.innerHTML = `<div class="empty-state" style="column-span:all"><div>🎨</div><p>${t('noPost')}</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    const img = (p.images&&p.images[0]) ? `<img src="${esc(p.images[0])}" class="pg-img" alt="" loading="lazy" onerror="this.remove()">` : '';
    const vidId = ytId(p.videoUrl);
    const vidThumb = vidId ? `<img src="https://img.youtube.com/vi/${vidId}/mqdefault.jpg" class="pg-img" alt="" loading="lazy">` : '';
    const thumb = img || vidThumb;
    const likes = p.likesCount||(Array.isArray(p.likes)?p.likes.length:0);
    return `
      <div class="pg-item" onclick="openPost('${p.id}')">
        ${thumb}
        <div class="pg-body">
          <span class="pg-cat ${catClass(p.category)}">${catLabel(p.category)}</span>
          ${p.content?`<div class="pg-text">${esc(p.content)}</div>`:''}
          <div class="pg-footer">
            <span class="pg-likes">❤️ ${likes}</span>
            <span class="pg-time">${timeAgo(p.createdAt)}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function filterTab(cat){ renderGrid(cat); }

// ─── Open post modal ───────────────────────────────────────
function openPost(pid){
  const p = allPosts.find(x=>x.id===pid);
  if(!p) return;

  const av = creatorData?.photoURL
    ? `<img src="${esc(creatorData.photoURL)}" class="pm-av" alt="" onerror="this.style.display='none'">`
    : `<div class="pm-av-init">${(creatorData?.displayName?.[0]||'?').toUpperCase()}</div>`;

  document.getElementById('pmAvWrap').innerHTML = av;
  document.getElementById('pmName').textContent = p.displayName || creatorData?.displayName || 'Creator';
  document.getElementById('pmTime').textContent = timeAgo(p.createdAt);

  let body = '';
  if(p.content) body += `<div class="pm-content">${esc(p.content)}</div>`;
  if(p.images&&p.images.length){
    body += `<div class="pm-imgs">${p.images.map(u=>`<img src="${esc(u)}" alt="" loading="lazy">`).join('')}</div>`;
  }
  const vid = ytId(p.videoUrl);
  if(vid) body += `<div class="pm-video"><iframe src="https://www.youtube.com/embed/${vid}?rel=0" allowfullscreen loading="lazy"></iframe></div>`;
  if(p.audioUrl) body += `<div style="margin-bottom:12px"><audio controls src="${esc(p.audioUrl)}" style="width:100%;border-radius:8px"></audio></div>`;

  const likes = p.likesCount||(Array.isArray(p.likes)?p.likes.length:0);
  body += `<div style="display:flex;align-items:center;gap:16px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border2)">
    <span style="color:var(--muted);font-size:.82rem">❤️ ${likes}</span>
    <span class="pg-cat ${catClass(p.category)}">${catLabel(p.category)}</span>
  </div>`;

  document.getElementById('pmBody').innerHTML = body;
  document.getElementById('postModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePostModal(){
  document.getElementById('postModal').classList.remove('open');
  document.body.style.overflow = '';
}

// ─── Message redirect ──────────────────────────────────────
function goMessage(){
  const uid = getUid();
  window.location.href = `/community/?dm=${uid}`;
}

// ─── Share modal ───────────────────────────────────────────
const shareUrl = () => window.location.href;
function openShareModal(){
  document.getElementById('shareUrl').textContent = shareUrl();
  document.getElementById('shareModal').classList.add('open');
}
function closeShareModal(){ document.getElementById('shareModal').classList.remove('open'); }
function shareCopy(){ navigator.clipboard.writeText(shareUrl()).then(()=>toast(t('copied'),'success')).catch(()=>{}); }
function shareWhatsApp(){ window.open(`https://wa.me/?text=${encodeURIComponent(t('shareMsg')+' '+shareUrl())}`, '_blank'); }
function shareFacebook(){ window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl())}`, '_blank'); }
function shareTwitter(){ window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(t('shareMsg'))}&url=${encodeURIComponent(shareUrl())}`, '_blank'); }
function sharePinterest(){ window.open(`https://pinterest.com/pin/create/button/?url=${encodeURIComponent(shareUrl())}`, '_blank'); }
function shareReddit(){ window.open(`https://www.reddit.com/submit?url=${encodeURIComponent(shareUrl())}&title=${encodeURIComponent(t('shareMsg'))}`, '_blank'); }
function shareEmbed(){
  const uid = getUid();
  const embedCode = `<iframe src="https://studios-pro.com/community/u.html?uid=${uid}" width="100%" height="600" frameborder="0" style="border-radius:16px;overflow:hidden;" allowfullscreen></iframe>`;
  navigator.clipboard.writeText(embedCode).then(()=>toast('Gallery Embed Code copied! 📋','success')).catch(()=>{});
}

// ─── Start ─────────────────────────────────────────────────
loadProfile();
</script>
